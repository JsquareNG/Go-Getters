name: CI

on:
  push:
    branches:
      - main
      - develop
      - shihui-cicd
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
      DATABASE_URL: sqlite:///./test.db
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
      SUPABASE_KEY: fake-generic-key
      BUCKET: test-bucket
      SENDGRID_API_KEY: fake-sendgrid-key
      DIDIT_API_KEY: fake-didit-key
      DIDIT_WORKFLOW_ID: fake-workflow-id

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx flake8

    #   to check if there are unused imports
    #   - name: Lint backend
    #     run: flake8 src/backend

      - name: Import check backend app
        run: python -c "from backend.main import app; print('backend import ok')"

      - name: Run backend unit tests
        run: pytest src/backend/unittest -q

  frontend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

    # enforce clean code on the frontend
    #   - name: Lint frontend
    #     working-directory: src/frontend
    #     run: npm run lint

      - name: Run frontend tests
        working-directory: src/frontend
        run: npm test

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build