name: CI

on:
  push:
    branches:
      - main
      - develop
      - shihui-cicd
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      DATABASE_URL: sqlite:///./test.db

      # Fake test values to prevent import-time crashes
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
      SUPABASE_KEY: fake-generic-key
      BUCKET: test-bucket

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run backend tests
        run: pytest src/backend/unittest -q

  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run frontend tests if configured
        working-directory: src/frontend
        run: |
          if npm run | grep -q " test"; then
            npm test
          else
            echo "No frontend test script configured, skipping tests."
          fi

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build