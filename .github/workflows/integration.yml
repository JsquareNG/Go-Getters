name: Integration Tests

on:
  push:
    branches:
      - main
      - shihui-cicd
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PYTHONPATH: src
      DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: fake-anon-key
      SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key
      SUPABASE_KEY: fake-key
      BUCKET: test-bucket
      SENDGRID_API_KEY: fake-sendgrid-key
      DIDIT_API_KEY: fake-didit-key
      DIDIT_WORKFLOW_ID: fake-workflow-id

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: src/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov pytest-asyncio psycopg2-binary

      - name: Run backend integration tests
        run: pytest src/backend/integrationtest -q